<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>boma-tetris</title>
  <style>
    @font-face {
      font-family: 'BomaMono';
      src: url('BOMA-MONO.otf') format('opentype');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #080808;
      font-family: 'BomaMono', monospace;
      color: #fff;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* ── desktop layout ────────────────────────────────── */
    #wrapper {
      display: flex;
      gap: 28px;
      align-items: flex-start;
    }

    #canvas-wrap { line-height: 0; }

    #game-canvas {
      border: 2px solid #222;
      display: block;
      background: #0d0d0d;
    }

    #sidebar {
      width: 150px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .panel {
      border: 1px solid #222;
      padding: 10px 12px;
      background: #0d0d0d;
    }
    .panel h3 {
      font-size: 10px;
      letter-spacing: 3px;
      color: #444;
      margin-bottom: 6px;
    }
    .panel .value {
      font-size: 26px;
      letter-spacing: 1px;
    }

    #next-canvas { display: block; margin: 0 auto; }

    .legend { display: flex; flex-direction: column; gap: 4px; font-size: 13px; letter-spacing: 1px; }
    .legend-row { display: flex; align-items: center; gap: 8px; }
    .legend-dot { font-size: 16px; font-family: 'BomaMono', monospace; }

    .controls-list { font-size: 10px; color: #444; line-height: 2; letter-spacing: 1px; }
    .controls-list span { color: #666; }

    /* ── overlay ───────────────────────────────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
      z-index: 10;
      overflow-y: auto;
      padding: 24px 16px;
    }

    #overlay h1 { font-size: 44px; letter-spacing: 6px; }

    #overlay .sub {
      font-size: 12px;
      color: #666;
      letter-spacing: 3px;
      text-align: center;
      line-height: 1.8;
    }

    .boma-demo { font-size: 28px; letter-spacing: 8px; margin-bottom: 4px; }

    #overlay button {
      margin-top: 4px;
      padding: 12px 36px;
      background: transparent;
      border: 1px solid #fff;
      color: #fff;
      font-family: 'BomaMono', monospace;
      font-size: 13px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    #overlay button:hover { background: #fff; color: #000; }

    /* name input */
    #player-name {
      background: transparent;
      border: none;
      border-bottom: 1px solid #333;
      color: #fff;
      font-family: 'BomaMono', monospace;
      font-size: 15px;
      letter-spacing: 3px;
      padding: 8px 4px;
      outline: none;
      text-align: center;
      width: 220px;
    }
    #player-name::placeholder { color: #333; }
    #player-name:focus { border-bottom-color: #666; }
    #name-error { font-size: 10px; color: #ff4455; letter-spacing: 2px; min-height: 14px; margin-top: 4px; text-align: center; }

    /* leaderboard */
    #ov-leaderboard { width: 280px; }
    .lb-header { font-size: 10px; letter-spacing: 3px; color: #333; margin-bottom: 6px; text-align: center; }
    .lb-row { display: flex; align-items: center; gap: 10px; font-size: 11px; letter-spacing: 1px; padding: 5px 0; border-bottom: 1px solid #1a1a1a; }
    .lb-rank  { color: #333; width: 18px; text-align: right; flex-shrink: 0; }
    .lb-name  { flex: 1; color: #555; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-score { color: #fff; flex-shrink: 0; }
    .lb-boma  { color: #333; font-size: 10px; flex-shrink: 0; }
    .lb-row.lb-you .lb-name { color: #ffd600; }
    .lb-row.lb-you .lb-rank { color: #ffd600; }
    .lb-empty { font-size: 10px; color: #333; letter-spacing: 2px; text-align: center; padding: 10px 0; }

    #ov-result { font-size: 13px; color: #666; letter-spacing: 2px; text-align: center; }

    /* score flash */
    #score-flash {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 36px;
      letter-spacing: 4px;
      color: #fff;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 20;
      text-shadow: 0 0 20px #fff;
    }

    /* ── mobile header (hidden on desktop) ─────────────── */
    #mobile-header {
      display: none;
      width: 100%;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: #0d0d0d;
      border-bottom: 1px solid #1a1a1a;
      gap: 8px;
    }
    .mh-stat { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .mh-label { font-size: 8px; letter-spacing: 2px; color: #333; }
    .mh-value { font-size: 18px; letter-spacing: 1px; }
    #mh-next { display: block; }

    /* ── mobile controls (hidden on desktop) ───────────── */
    #mobile-controls {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #080808;
      border-top: 1px solid #1a1a1a;
      padding: 10px 12px 14px;
      flex-direction: column;
      gap: 8px;
      z-index: 5;
    }
    .mc-row { display: flex; gap: 8px; justify-content: center; }
    .mc-btn {
      flex: 1;
      max-width: 90px;
      height: 52px;
      background: #111;
      border: 1px solid #2a2a2a;
      color: #ccc;
      font-family: 'BomaMono', monospace;
      font-size: 20px;
      cursor: pointer;
      border-radius: 3px;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      transition: background 0.08s;
    }
    .mc-btn:active, .mc-btn.pressed { background: #222; color: #fff; }
    .mc-drop {
      font-size: 11px;
      letter-spacing: 2px;
      border-color: #444;
      color: #fff;
      max-width: 120px;
    }
    .mc-pause { font-size: 14px; max-width: 60px; color: #555; }

    /* ── mobile responsive ─────────────────────────────── */
    @media (max-width: 599px) {
      body { align-items: flex-start; justify-content: flex-start; }

      #wrapper {
        flex-direction: column;
        align-items: center;
        width: 100%;
        gap: 0;
        padding-bottom: 130px;
      }

      #sidebar { display: none; }

      #mobile-header { display: flex; }
      #mobile-controls { display: flex; }

      #canvas-wrap {
        display: flex;
        justify-content: center;
        width: 100%;
      }

      #overlay h1 { font-size: 32px; }
      #ov-leaderboard { width: 100%; max-width: 300px; }
    }
  </style>
</head>
<body>

<!-- overlay (start / paused / game over) -->
<div id="overlay">
  <h1 id="ov-title">boma</h1>

  <div id="ov-intro">
    <div class="boma-demo" style="text-align:center">
      <span style="color:#00e5ff">b</span><span style="color:#ffd600">o</span><span style="color:#ff44cc">m</span><span style="color:#66ff66">a</span>
    </div>
    <div class="sub">
      forme a palavra <strong>boma</strong><br>
      horizontal ou vertical<br>
      para marcar <strong>100 pontos</strong>
    </div>
  </div>

  <div id="ov-result"></div>

  <div id="ov-name">
    <input type="text" id="player-name" placeholder="seu nome" maxlength="20" autocomplete="off" spellcheck="false" />
    <div id="name-error"></div>
  </div>

  <div id="ov-leaderboard">
    <div class="lb-header">top 10</div>
    <div id="lb-rows"></div>
  </div>

  <button id="start-btn">iniciar</button>

  <div id="ov-controls" class="controls-list" style="text-align:center; color:#333; font-size:10px; letter-spacing:2px; line-height:2">
    ← → mover &nbsp; ↑ girar &nbsp; ↓ descer &nbsp; spc drop &nbsp; p pausa
  </div>
</div>

<div id="score-flash">+100</div>

<div id="wrapper">
  <!-- compact stats bar (mobile only) -->
  <div id="mobile-header">
    <div class="mh-stat">
      <span class="mh-label">score</span>
      <span class="mh-value" id="mh-score">0</span>
    </div>
    <div class="mh-stat">
      <span class="mh-label">boma</span>
      <span class="mh-value" id="mh-boma">0</span>
    </div>
    <div class="mh-stat">
      <span class="mh-label">nível</span>
      <span class="mh-value" id="mh-level">1</span>
    </div>
    <canvas id="mh-next" width="60" height="44"></canvas>
  </div>

  <!-- canvas -->
  <div id="canvas-wrap">
    <canvas id="game-canvas"></canvas>
  </div>

  <!-- desktop sidebar -->
  <div id="sidebar">
    <div class="panel">
      <h3>score</h3>
      <div class="value" id="score-display">0</div>
    </div>
    <div class="panel">
      <h3>boma</h3>
      <div class="value" id="boma-display">0</div>
    </div>
    <div class="panel">
      <h3>nível</h3>
      <div class="value" id="level-display">1</div>
    </div>
    <div class="panel">
      <h3>próxima</h3>
      <canvas id="next-canvas" width="150" height="108"></canvas>
    </div>
    <div class="panel legend">
      <div class="legend-row"><span class="legend-dot" style="color:#00e5ff">b</span><span style="color:#222">━━━━</span><span style="color:#00e5ff;font-size:10px">b</span></div>
      <div class="legend-row"><span class="legend-dot" style="color:#ffd600">o</span><span style="color:#222">━━━━</span><span style="color:#ffd600;font-size:10px">o</span></div>
      <div class="legend-row"><span class="legend-dot" style="color:#ff44cc">m</span><span style="color:#222">━━━━</span><span style="color:#ff44cc;font-size:10px">m</span></div>
      <div class="legend-row"><span class="legend-dot" style="color:#66ff66">a</span><span style="color:#222">━━━━</span><span style="color:#66ff66;font-size:10px">a</span></div>
    </div>
    <div class="controls-list">
      <span>← →</span> mover<br>
      <span>↑</span> girar<br>
      <span>↓</span> descer<br>
      <span>spc</span> hard drop<br>

    </div>
  </div>
</div>

<!-- mobile controls (fixed, bottom) -->
<div id="mobile-controls">
  <div class="mc-row">
    <button class="mc-btn" data-action="left">←</button>
    <button class="mc-btn" data-action="rotate">↺</button>
    <button class="mc-btn" data-action="right">→</button>
  </div>
  <div class="mc-row">
    <button class="mc-btn" data-action="down">↓</button>
    <button class="mc-btn mc-drop" data-action="drop">drop</button>
    <button class="mc-btn mc-pause" data-action="pause">⏸</button>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const COLS = 10;
const ROWS = 20;
const CELL = 34;

const LETTER_COLOR = { b:'#00e5ff', o:'#ffd600', m:'#ff44cc', a:'#66ff66' };
const LETTERS = ['b','o','m','a'];
const WORD    = 'boma';

const PIECES = {
  I: [[1,1,1,1]],
  O: [[1,1],[1,1]],
  T: [[0,1,0],[1,1,1]],
  S: [[0,1,1],[1,1,0]],
  Z: [[1,1,0],[0,1,1]],
  J: [[1,0,0],[1,1,1]],
  L: [[0,0,1],[1,1,1]],
};
const PIECE_KEYS = Object.keys(PIECES);
const SPEEDS = [850,720,600,500,400,320,250,190,140,100];

// ─── CANVAS ───────────────────────────────────────────────────────────────────
const canvas     = document.getElementById('game-canvas');
canvas.width     = COLS * CELL;
canvas.height    = ROWS * CELL;
const ctx        = canvas.getContext('2d');

const nextCanvas = document.getElementById('next-canvas');
const nctx       = nextCanvas.getContext('2d');

const mhNext     = document.getElementById('mh-next');
const mhCtx      = mhNext.getContext('2d');

// ─── STATE ────────────────────────────────────────────────────────────────────
let board, current, nextPiece;
let score, bomaCount, level;
let lastTime, dropAccum, paused, gameOver;
let flashCells = new Set();
let flashTimer = null;
let loopStarted = false;

// ─── BOARD ────────────────────────────────────────────────────────────────────
function newBoard() {
  return Array.from({length: ROWS}, () => Array(COLS).fill(null));
}

// ─── PIECE ────────────────────────────────────────────────────────────────────
function randomLetter() { return LETTERS[Math.floor(Math.random() * LETTERS.length)]; }

function createPiece() {
  const key   = PIECE_KEYS[Math.floor(Math.random() * PIECE_KEYS.length)];
  const shape = PIECES[key].map(r => [...r]);
  const letters = shape.map(row => row.map(cell => cell ? randomLetter() : null));
  return { shape, letters, x: Math.floor((COLS - shape[0].length) / 2), y: 0 };
}

function rotatePiece(piece) {
  const rows = piece.shape.length, cols = piece.shape[0].length;
  const newShape = [], newLetters = [];
  for (let c = 0; c < cols; c++) {
    newShape.push([]); newLetters.push([]);
    for (let r = rows - 1; r >= 0; r--) {
      newShape[c].push(piece.shape[r][c]);
      newLetters[c].push(piece.letters[r][c]);
    }
  }
  return { ...piece, shape: newShape, letters: newLetters };
}

// ─── COLLISION ────────────────────────────────────────────────────────────────
function collides(piece, board, dx = 0, dy = 0) {
  for (let r = 0; r < piece.shape.length; r++) {
    for (let c = 0; c < piece.shape[r].length; c++) {
      if (!piece.shape[r][c]) continue;
      const nx = piece.x + c + dx, ny = piece.y + r + dy;
      if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
      if (ny >= 0 && board[ny][nx]) return true;
    }
  }
  return false;
}

// ─── LOCK ─────────────────────────────────────────────────────────────────────
function lockPiece(piece) {
  for (let r = 0; r < piece.shape.length; r++) {
    for (let c = 0; c < piece.shape[r].length; c++) {
      const letter = piece.letters[r][c];
      if (!letter) continue;
      const ny = piece.y + r, nx = piece.x + c;
      if (ny < 0) { gameOver = true; return; }
      board[ny][nx] = { letter, color: LETTER_COLOR[letter] };
    }
  }
}

// ─── BOMA DETECTION ───────────────────────────────────────────────────────────
function findBoma() {
  const found = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c <= COLS - 4; c++) {
      let match = true;
      for (let i = 0; i < 4; i++) {
        const cell = board[r][c + i];
        if (!cell || cell.letter !== WORD[i]) { match = false; break; }
      }
      if (match) { found.push([{r,c},{r,c:c+1},{r,c:c+2},{r,c:c+3}]); c += 3; }
    }
  }
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r <= ROWS - 4; r++) {
      let match = true;
      for (let i = 0; i < 4; i++) {
        const cell = board[r + i][c];
        if (!cell || cell.letter !== WORD[i]) { match = false; break; }
      }
      if (match) { found.push([{r,c},{r:r+1,c},{r:r+2,c},{r:r+3,c}]); r += 3; }
    }
  }
  return found;
}

function clearBomaCells(words) {
  for (const word of words)
    for (const {r, c} of word) board[r][c] = null;
  for (let c = 0; c < COLS; c++) {
    let w = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (board[r][c]) { board[w][c] = board[r][c]; if (w !== r) board[r][c] = null; w--; }
    }
    while (w >= 0) { board[w][c] = null; w--; }
  }
}

function clearFullLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(c => c !== null)) {
      board.splice(r, 1);
      board.unshift(Array(COLS).fill(null));
      r++; cleared++;
    }
  }
  return cleared;
}

// ─── DRAW ─────────────────────────────────────────────────────────────────────
function setFont(context, size) {
  context.font = `bold ${size}px BomaMono, monospace`;
  context.textAlign = 'center';
  context.textBaseline = 'middle';
}

function drawCell(context, col, row, letter, alpha = 1, cellSize = CELL, flash = false) {
  const cx = col * cellSize + cellSize / 2;
  const cy = row * cellSize + cellSize / 2;
  const color = LETTER_COLOR[letter] || '#fff';
  context.globalAlpha = alpha;
  if (flash) {
    context.fillStyle = color;
    context.fillRect(col * cellSize + 1, row * cellSize + 1, cellSize - 2, cellSize - 2);
    context.fillStyle = '#000';
  } else {
    context.fillStyle = color;
  }
  setFont(context, cellSize - 6);
  context.fillText(letter, cx, cy + 1);
  context.globalAlpha = 1;
}

function drawBoard() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#141414'; ctx.lineWidth = 1;
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(canvas.width, r * CELL); ctx.stroke();
  }
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, canvas.height); ctx.stroke();
  }
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = board[r][c];
      if (!cell) continue;
      drawCell(ctx, c, r, cell.letter, 1, CELL, flashCells.has(`${r},${c}`));
    }
  }
  if (!current || flashTimer) return;
  // ghost
  let ghost = { ...current };
  while (!collides(ghost, board, 0, 1)) ghost.y++;
  if (ghost.y !== current.y) {
    for (let r = 0; r < current.shape.length; r++)
      for (let c = 0; c < current.shape[r].length; c++) {
        const letter = current.letters[r][c];
        if (letter) drawCell(ctx, ghost.x + c, ghost.y + r, letter, 0.15);
      }
  }
  // active
  for (let r = 0; r < current.shape.length; r++)
    for (let c = 0; c < current.shape[r].length; c++) {
      const letter = current.letters[r][c];
      if (letter) drawCell(ctx, current.x + c, current.y + r, letter, 1);
    }
}

function drawNext() {
  // desktop canvas
  nctx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
  // mobile header canvas
  mhCtx.clearRect(0, 0, mhNext.width, mhNext.height);
  if (!nextPiece) return;

  const cs = 28;
  const offX = Math.floor((nextCanvas.width  / cs - nextPiece.shape[0].length) / 2);
  const offY = Math.floor((nextCanvas.height / cs - nextPiece.shape.length) / 2);
  for (let r = 0; r < nextPiece.shape.length; r++)
    for (let c = 0; c < nextPiece.shape[r].length; c++) {
      const letter = nextPiece.letters[r][c];
      if (letter) drawCell(nctx, offX + c, offY + r, letter, 1, cs);
    }

  // mobile preview (smaller)
  const ms = 20;
  const mox = Math.floor((mhNext.width  / ms - nextPiece.shape[0].length) / 2);
  const moy = Math.floor((mhNext.height / ms - nextPiece.shape.length) / 2);
  for (let r = 0; r < nextPiece.shape.length; r++)
    for (let c = 0; c < nextPiece.shape[r].length; c++) {
      const letter = nextPiece.letters[r][c];
      if (letter) drawCell(mhCtx, mox + c, moy + r, letter, 1, ms);
    }
}

function updateUI() {
  document.getElementById('score-display').textContent = score;
  document.getElementById('boma-display').textContent  = bomaCount;
  document.getElementById('level-display').textContent = level;
  document.getElementById('mh-score').textContent = score;
  document.getElementById('mh-boma').textContent  = bomaCount;
  document.getElementById('mh-level').textContent = level;
}

// ─── SCORE FLASH ──────────────────────────────────────────────────────────────
const scoreFlashEl = document.getElementById('score-flash');
let scoreFlashTO = null;
function showScoreFlash(text) {
  scoreFlashEl.textContent = text;
  scoreFlashEl.style.opacity = '1';
  clearTimeout(scoreFlashTO);
  scoreFlashTO = setTimeout(() => { scoreFlashEl.style.opacity = '0'; }, 700);
}

// ─── AFTER LOCK ───────────────────────────────────────────────────────────────
function afterLock() {
  const linesCleared = clearFullLines();
  if (linesCleared > 0) { score += linesCleared; updateUI(); }

  const words = findBoma();
  if (words.length > 0) {
    flashCells.clear();
    for (const word of words)
      for (const {r, c} of word) flashCells.add(`${r},${c}`);

    const pts = words.length * 100;
    score     += pts;
    bomaCount += words.length;
    level      = Math.floor(bomaCount / 5) + 1;
    updateUI();
    showScoreFlash(`+${pts}`);
    drawBoard();

    flashTimer = setTimeout(() => {
      flashTimer = null;
      flashCells.clear();
      clearBomaCells(words);
      const extra = clearFullLines();
      if (extra > 0) { score += extra; updateUI(); }
      spawnNext();
      drawBoard();
    }, 600);
  } else {
    spawnNext();
  }
}

function spawnNext() {
  current   = nextPiece;
  nextPiece = createPiece();
  drawNext();
  if (collides(current, board)) {
    gameOver = true;
    drawBoard();
    handleGameOver();
  }
}

// ─── DROP ─────────────────────────────────────────────────────────────────────
function drop() {
  if (paused || gameOver || flashTimer) return;
  if (!collides(current, board, 0, 1)) { current.y++; }
  else { lockPiece(current); if (!gameOver) afterLock(); }
  drawBoard();
}

function hardDrop() {
  if (paused || gameOver || flashTimer) return;
  while (!collides(current, board, 0, 1)) current.y++;
  lockPiece(current);
  if (!gameOver) afterLock();
  dropAccum = 0;
  drawBoard();
}

function doRotate() {
  if (paused || gameOver || flashTimer) return;
  const rot = rotatePiece(current);
  if      (!collides(rot, board))        current = rot;
  else if (!collides(rot, board,  1, 0)) current = { ...rot, x: rot.x + 1 };
  else if (!collides(rot, board, -1, 0)) current = { ...rot, x: rot.x - 1 };
  drawBoard();
}

// ─── LOOP ─────────────────────────────────────────────────────────────────────
function getSpeed() { return SPEEDS[Math.min(level - 1, SPEEDS.length - 1)]; }

function loop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = ts - lastTime; lastTime = ts;
  if (!paused && !gameOver && !flashTimer) {
    dropAccum += dt;
    if (dropAccum >= getSpeed()) { drop(); dropAccum = 0; }
  }
  drawBoard();
  requestAnimationFrame(loop);
}

// ─── KEYBOARD ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (gameOver) return;
  if (paused && e.key !== 'p' && e.key !== 'P') return;
  if (flashTimer && e.key !== 'p' && e.key !== 'P') return;
  switch (e.key) {
    case 'ArrowLeft':
      if (!collides(current, board, -1, 0)) { current.x--; drawBoard(); } break;
    case 'ArrowRight':
      if (!collides(current, board,  1, 0)) { current.x++; drawBoard(); } break;
    case 'ArrowDown':
      drop(); dropAccum = 0; break;
    case 'ArrowUp':
      doRotate(); break;
    case ' ':
      e.preventDefault(); hardDrop(); break;
    case 'p': case 'P':
      paused = !paused;
      if (paused) showPaused();
      else { hideSections(); overlay.style.display = 'none'; lastTime = null; }
      break;
  }
});

// ─── MOBILE CONTROLS ──────────────────────────────────────────────────────────
const MC_ACTIONS = {
  left:   () => { if (!paused && !gameOver && !flashTimer && !collides(current, board, -1, 0)) { current.x--; drawBoard(); } },
  right:  () => { if (!paused && !gameOver && !flashTimer && !collides(current, board,  1, 0)) { current.x++; drawBoard(); } },
  rotate: () => doRotate(),
  down:   () => { if (!paused && !gameOver && !flashTimer) { drop(); dropAccum = 0; } },
  drop:   () => hardDrop(),
  pause:  () => {
    if (gameOver) return;
    paused = !paused;
    if (paused) showPaused();
    else { hideSections(); overlay.style.display = 'none'; lastTime = null; }
  },
};

document.querySelectorAll('[data-action]').forEach(btn => {
  const action = MC_ACTIONS[btn.dataset.action];
  if (!action) return;
  btn.addEventListener('touchstart', e => { e.preventDefault(); action(); }, { passive: false });
  btn.addEventListener('mousedown',  e => { e.preventDefault(); action(); });
});

// ─── MOBILE CANVAS SCALE ──────────────────────────────────────────────────────
function scaleMobile() {
  const isMobile = window.innerWidth < 600;
  if (!isMobile) { canvas.style.transform = ''; canvas.parentElement.style.height = ''; return; }
  const avail = window.innerWidth - 4;
  const scale = Math.min(1, avail / canvas.width);
  canvas.style.transformOrigin = 'top center';
  canvas.style.transform       = `scale(${scale})`;
  canvas.parentElement.style.height = Math.floor(canvas.height * scale) + 'px';
}
window.addEventListener('resize', scaleMobile);

// ─── OVERLAY ──────────────────────────────────────────────────────────────────
const overlay   = document.getElementById('overlay');
const startBtn  = document.getElementById('start-btn');
const nameInput = document.getElementById('player-name');
const nameError = document.getElementById('name-error');
const lbRows    = document.getElementById('lb-rows');

let playerName = '';

function hideSections() {
  document.getElementById('ov-intro').style.display       = 'none';
  document.getElementById('ov-result').style.display      = 'none';
  document.getElementById('ov-name').style.display        = 'none';
  document.getElementById('ov-leaderboard').style.display = 'none';
  document.getElementById('ov-controls').style.display    = 'none';
  nameError.textContent = '';
}

function showStart() {
  hideSections();
  document.getElementById('ov-title').textContent        = 'boma';
  document.getElementById('ov-intro').style.display      = 'block';
  document.getElementById('ov-name').style.display       = 'block';
  document.getElementById('ov-leaderboard').style.display= 'block';
  document.getElementById('ov-controls').style.display   = 'block';
  nameInput.value      = playerName;
  startBtn.textContent = 'iniciar';
  overlay.style.display = 'flex';
  setTimeout(() => nameInput.focus(), 50);
}

function showPaused() {
  hideSections();
  document.getElementById('ov-title').textContent = 'pausado';
  startBtn.textContent = 'continuar';
  overlay.style.display = 'flex';
}

function showGameOver() {
  hideSections();
  document.getElementById('ov-title').textContent = 'game over';
  const result = document.getElementById('ov-result');
  result.innerHTML = `score: <strong style="color:#fff">${score}</strong> &nbsp; boma: <strong style="color:#ffd600">${bomaCount}×</strong>`;
  result.style.display = 'block';
  document.getElementById('ov-name').style.display        = 'block';
  document.getElementById('ov-leaderboard').style.display = 'block';
  nameInput.value      = playerName;
  startBtn.textContent = 'reiniciar';
  overlay.style.display = 'flex';
}

// ─── LEADERBOARD ──────────────────────────────────────────────────────────────
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderLeaderboard(scores) {
  if (!scores.length) { lbRows.innerHTML = '<div class="lb-empty">nenhuma pontuação ainda</div>'; return; }
  lbRows.innerHTML = scores.map((s, i) => `
    <div class="lb-row${s.name === playerName ? ' lb-you' : ''}">
      <span class="lb-rank">${i + 1}</span>
      <span class="lb-name">${escHtml(s.name)}</span>
      <span class="lb-score">${s.score}</span>
      <span class="lb-boma">${s.boma}×</span>
    </div>`).join('');
}

async function fetchScores() {
  try { const r = await fetch('/scores'); renderLeaderboard(await r.json()); }
  catch { renderLeaderboard([]); }
}

async function submitScore() {
  try {
    const r = await fetch('/scores', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: playerName, score, boma: bomaCount }),
    });
    renderLeaderboard(await r.json());
  } catch { /* offline */ }
}

async function handleGameOver() {
  if (playerName) await submitScore();
  showGameOver();
}

// ─── GAME START ───────────────────────────────────────────────────────────────
function startGame() {
  board = newBoard(); score = 0; bomaCount = 0; level = 1;
  paused = false; gameOver = false; dropAccum = 0; lastTime = null;
  flashCells.clear();
  if (flashTimer) { clearTimeout(flashTimer); flashTimer = null; }
  nextPiece = createPiece();
  current   = createPiece();
  updateUI(); drawNext(); drawBoard();
  overlay.style.display = 'none';
}

startBtn.addEventListener('click', () => {
  if (paused) {
    paused = false;
    overlay.style.display = 'none';
    lastTime = null;
    return;
  }
  const name = nameInput.value.trim();
  if (!name) { nameError.textContent = 'informe seu nome'; nameInput.focus(); return; }
  playerName = name;
  nameError.textContent = '';
  startGame();
  if (!loopStarted) { loopStarted = true; requestAnimationFrame(loop); }
});

nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') startBtn.click(); });

// ─── INIT ─────────────────────────────────────────────────────────────────────
board = newBoard();
drawBoard();
scaleMobile();
fetchScores();
showStart();
</script>
</body>
</html>
