<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>subway b1</title>

  <!-- Three.js importmap -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>

  <!-- Canvas container -->
  <div id="app"></div>

  <!-- ── HUD ──────────────────────────────────────────────────────────────── -->
  <div id="hud">
    <!-- Top row -->
    <div class="hud-top">
      <!-- Score -->
      <div class="hud-score-block">
        <span class="hud-label">pontuação</span>
        <span id="score-value">0</span>
      </div>

      <!-- Coins -->
      <div class="hud-coin-block">
        <div class="coin-icon"></div>
        <span id="coin-value">0</span>
      </div>

      <!-- Pause button -->
      <button class="hud-pause-btn" id="pause-btn">pausa</button>
    </div>

    <div class="hud-spacer"></div>

    <!-- Bottom row -->
    <div class="hud-bottom">
      <!-- Mission -->
      <div class="mission-bar">
        <span id="mission-text">missão atual</span>
        <div class="mission-track">
          <div id="mission-progress-fill"></div>
        </div>
      </div>

      <!-- Power-up indicator -->
      <div id="powerup-indicator">
        <div id="powerup-icon"></div>
        <span id="powerup-name">power-up</span>
        <div class="powerup-bar-track">
          <div id="powerup-bar-fill"></div>
        </div>
      </div>

      <!-- Hoverboard indicator -->
      <div id="hoverboard-indicator">
        <div class="hoverboard-icon"></div>
        <span class="hoverboard-label">hoverboard</span>
      </div>
    </div>
  </div>

  <!-- ── Menu Screen ───────────────────────────────────────────────────────── -->
  <div id="menu-screen" class="screen">
    <div class="menu-logo">subway b1</div>
    <div class="menu-subtitle">∙ endless runner ∙</div>

    <div class="menu-highscore">
      recorde: <span id="high-score-value">0</span>
    </div>

    <div class="menu-controls">
      <button class="btn btn-primary" id="play-btn">jogar</button>
    </div>

    <div class="controls-hint">
      <span><kbd>←</kbd><kbd>→</kbd> mudar faixa</span>
      <span><kbd>W</kbd><kbd>espaço</kbd> pular</span>
      <span><kbd>S</kbd> rolar</span>
      <span><kbd>P</kbd><kbd>esc</kbd> pausar</span>
    </div>
  </div>

  <!-- ── Pause Screen ──────────────────────────────────────────────────────── -->
  <div id="pause-screen" class="screen" style="display:none;">
    <div class="pause-title">pausado</div>

    <div class="pause-controls">
      <button class="btn btn-primary" id="resume-btn">continuar</button>
      <button class="btn btn-ghost" id="pause-menu-btn">menu principal</button>
    </div>
  </div>

  <!-- ── Game Over Screen ──────────────────────────────────────────────────── -->
  <div id="gameover-screen" class="screen" style="display:none;">
    <div class="gameover-title">game over</div>

    <div id="new-highscore">✦ novo recorde! ✦</div>

    <div class="gameover-stats">
      <div class="stat-row">
        <span class="stat-label">pontuação</span>
        <span class="stat-value gold" id="final-score">0</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-row">
        <span class="stat-label">moedas</span>
        <span class="stat-value" id="final-coins">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">distância</span>
        <span class="stat-value" id="final-distance">0m</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-row">
        <span class="stat-label">melhor</span>
        <span class="stat-value gold" id="gameover-highscore">0</span>
      </div>
    </div>

    <div class="gameover-buttons">
      <button class="btn btn-accent" id="continue-btn">continuar (5 🔑)</button>
      <div class="gameover-row">
        <button class="btn btn-primary" id="restart-btn">tentar novamente</button>
        <button class="btn btn-ghost" id="menu-btn">menu</button>
      </div>
    </div>
  </div>

  <!-- Main module -->
  <script type="module" src="src/main.js"></script>
</body>
</html>
